{% if math.provider == 'katex' %}
<script defer src="{{ math.cdn.javascript }}" crossorigin="anonymous"></script>
{% if math.cdn.auto_render %}
<script defer src="{{ math.cdn.auto_render }}" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof renderMathInElement !== 'function') return;
  renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true },
    ],
    throwOnError: false,
  });
});
</script>
{% endif %}
{% elif math.provider == 'mathjax' %}
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)'], ['$', '$']],
    displayMath: [['\\[', '\\]'], ['$$', '$$']],
    processEscapes: true,
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
  },
};
</script>
<script defer src="{{ math.cdn.javascript }}" crossorigin="anonymous"></script>
{% endif %}
