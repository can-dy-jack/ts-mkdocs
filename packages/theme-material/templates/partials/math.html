{% if math.provider == 'katex' %}
<script defer src="{{ math.cdn.javascript }}" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof katex === 'undefined') return;

  document.querySelectorAll('.arithmatex').forEach(function (el) {
    var tex = el.textContent.trim();
    var displayMode = el.tagName === 'DIV';

    if (tex.indexOf('\\(') === 0 && tex.lastIndexOf('\\)') === tex.length - 2) {
      tex = tex.slice(2, -2);
    } else if (tex.indexOf('\\[') === 0 && tex.lastIndexOf('\\]') === tex.length - 2) {
      tex = tex.slice(2, -2);
      displayMode = true;
    }

    katex.render(tex, el, { displayMode: displayMode, throwOnError: false });
  });
});
</script>
{% elif math.provider == 'mathjax' %}
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)'], ['$', '$']],
    displayMath: [['\\[', '\\]'], ['$$', '$$']],
    processEscapes: true,
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
  },
};
</script>
<script defer src="{{ math.cdn.javascript }}" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (!window.MathJax || typeof MathJax.typesetPromise !== 'function') return;
  MathJax.typesetPromise();
});
</script>
{% endif %}
