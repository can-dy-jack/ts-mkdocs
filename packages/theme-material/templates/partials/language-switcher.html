{% if alternates and alternates | length > 1 %}
<div class="md-header__option md-header__option--language">
  <div class="md-language" data-md-component="language">
    {% call tooltip('language-switch', i18n['language.switch'], 'md-tooltip--header', 'bottom') %}
    <button type="button" class="md-header__button md-header__button--language" id="language-toggle" aria-describedby="language-switch-tooltip" aria-label="{{ i18n['language.switch'] }}" aria-haspopup="true" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="m12.87 15.07-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2zm-2.62 7 1.62-4.33L19.12 17z"/></svg>
    </button>
    {% endcall %}
    <div class="md-language__dropdown" id="language-dropdown" hidden>
      <ul class="md-language__list">
        {% for alt in alternates %}
        <li class="md-language__item{% if alt.active %} md-language__item--active{% endif %}">
          <a href="{{ alt.link }}" hreflang="{{ alt.lang }}" class="md-language__link" data-locale="{{ alt.lang }}"{% if alt.active %} aria-current="true"{% endif %}>{{ alt.name }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endif %}
