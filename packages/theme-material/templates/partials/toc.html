{% macro render_toc(entries) %}
<ul class="md-nav__list">
  {% for entry in entries %}
    {% if entry.children | length > 0 %}
    <li class="md-nav__item md-nav__item--nested">
      <a href="#{{ entry.id }}" class="md-nav__link">{{ entry.title }}</a>
      <nav class="md-nav" aria-label="{{ entry.title }}">
        {{ render_toc(entry.children) }}
      </nav>
    </li>
    {% else %}
    <li class="md-nav__item">
      <a href="#{{ entry.id }}" class="md-nav__link">{{ entry.title }}</a>
    </li>
    {% endif %}
  {% endfor %}
</ul>
{% endmacro %}

{{ render_toc(toc) }}
