site_name: ts-mkdocs
site_description: A demo site built with ts-mkdocs to validate features during development
site_url: https://example.com/
repo_url: https://github.com/can-dy-jack/ts-mkdocs
repo_name: can-dy-jack/ts-mkdocs
copyright: Copyright &copy; {year} ts-mkdocs contributors

edit_uri: edit/main/docs/
site_dir: site

nav:
  - Home: index.md
  - Tutorial:
    - What is ts-mkdocs?: tutorial/index.md
    - Features: tutorial/features.md
    - Quick Start: tutorial/quick-start.md
    - Basic Configuration: tutorial/basic-config.md
  - Syntax:
    - Overview: syntax/index.md
    - Basic Syntax:
      - Headings: syntax/basic/headings.md
      - Text & Links: syntax/basic/text.md
      - Blockquotes: syntax/basic/blockquote.md
      - Lists: syntax/basic/lists.md
      - Tables: syntax/basic/tables.md
    - Extended Syntax:
      - Code Blocks: syntax/extended/code-blocks.md
      - Task Lists: syntax/extended/tasklist.md
      - Footnotes: syntax/extended/footnotes.md
      - Abbreviations & Definition Lists: syntax/extended/abbr-deflist.md
      - Icons: syntax/extended/icons.md
      - Keyboard & Mark: syntax/extended/keys-mark.md
      - MagicLink: syntax/extended/magiclink.md
      - Superscript & Subscript: syntax/extended/sup-sub.md
      - Images: syntax/extended/images.md
      - Attributes: syntax/extended/attributes.md
    - Advanced Components:
      - Admonitions: syntax/advanced/admonitions.md
      - Content Tabs: syntax/advanced/tabs.md
      - Annotations: syntax/advanced/annotations.md
      - Math: syntax/advanced/math.md
      - Mermaid: syntax/advanced/mermaid.md
      - Comments: syntax/advanced/comments.md
    - Nesting & Combinations:
      - Combinations: syntax/nesting/combinations.md
  - Reference:
    - Overview: reference/index.md
    - Configuration: reference/config.md
    - Theme: reference/theme.md
    - Markdown Extensions: reference/extensions.md
    - Plugins: reference/plugins.md
    - CLI: reference/cli.md
    - Plugin API: reference/plugin-api.md
    - Frontmatter: reference/frontmatter.md
  - Changelog:
    - Overview: changelog/index.md
    - Unreleased: changelog/unreleased.md
    - v0.1.0: changelog/v0.1.0.md

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: indigo
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  # Syntax highlighting themes (Shiki built-in theme names)
  # Light candidates: github-light, catppuccin-latte, solarized-light, min-light
  # Dark  candidates: github-dark, dracula, nord, one-dark-pro, catppuccin-mocha
  highlight:
    theme_light: catppuccin-latte
    theme_dark: github-dark
  icons:
    default: material
    libraries:
      - material
      - fontawesome
      - bootstrap
  icon:
    admonition:
      note: material/info
      tip: material/lightbulb
    theme:
      light: material/wb_sunny
      dark: material/dark_mode
      system: material/brightness_auto
  # Reader settings panel (header gear icon). Omit any field to keep built-in defaults.
  # Default accent color follows theme.palette primary; choices persist in localStorage.
  settings:
    enabled: true
    colors:
      - name: Blue
        color: "#2196f3"
      - name: Teal
        color: "#009688"
      - name: Green
        color: "#4caf50"
      - name: Purple
        color: "#9c27b0"
    fonts:
      - name: System
      - name: Serif
        family: '"Noto Serif", Georgia, serif'
        url: https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap
      - name: Mono
        family: '"JetBrains Mono", "Fira Code", monospace'
    font_sizes:
      - name: Small
        value: 90
      - name: Default
        value: 115
      - name: Large
        value: 135
      - name: Extra large
        value: 160
    default_font_size: 115
  # Page-level share buttons (shown at the bottom of each article)
  share:
    enabled: true
    platforms:
      - x
      - facebook
      - weibo
      - linkedin
      - wechat
      - bilibili
      - zhihu
      - reddit
      - telegram
      - whatsapp
      - email
      - threads
      - bluesky
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.linenumbers
    - content.code.lang
    - content.code.wrap
    - content.code.annotate
    - content.image.lightbox

extra_css:
  - assets/custom.css
  - assets/icon-browser.css

extra_javascript:
  - assets/custom.js
  - path: assets/icon-browser.js
    defer: true

plugins:
  - search
  - meta
  - git-revision-date:
      enable_creation_date: true
      fallback_to_build_date: true
      source: git                  # git（默认）| filesystem
      # exclude:                     # 跳过的页面（相对 docs_dir）
      #   - index.md
  - tags:
      sort_by: count
  - social
  - sitemap:
      hostname: https://example.com
  - robots

markdown_extensions:
  - admonition:
      default_collapsed: false
      types: # extra type
        todo:
          title: Todo
          icon: material/checklist
          color: '#795548'
        experimental:
          title: Experimental
          icon: material/experiment
          color: '#673ab7'
  - md.details:
      default_collapsed: true
  - md.tabs:
      alternate_style: true
  - md.fences:
      mermaid:
        version: "11"
        cdn:
          base: https://cdn.jsdelivr.net/npm/mermaid@11/dist
        theme: auto
  - md.tasklist
  - md.keys
  - md.mark
  - md.links:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      repo_url_shortener: true
  - md.emoji
  - md.caret
  - md.tilde
  - attr_list
  - tables
  - footnotes
  - abbr
  - def_list
  - md.math:
      provider: katex
      version: "0.16.22"
      cdn:
        base: https://cdn.jsdelivr.net/npm/katex@0.16.22/dist
  - toc:
      permalink: true
      toc_depth: 3   # include h2–h3 in page TOC (default: 3)

extra:
  authors:
    kartjim:
      name: Kart Jim
      title: ts-mkdocs author
      avatar: https://avatars.githubusercontent.com/u/62332701
      url:
        github: can-dy-jack/ts-mkdocs
        x: kartjim2
        reddit: kartjim
        youtube: kartjim5475
        bilibili: 481922596
        website: https://kartjim.cn
  reading_time:
    enabled: true
    words_per_minute: 265
    cjk_chars_per_minute: 500
    exclude_code: true
    min_minutes: 1
  license:
    enabled: true
    preset: cc-by-nc-sa-4.0
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/can-dy-jack/ts-mkdocs
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/
    - icon: fontawesome/brands/discord
      link: https://discord.com/
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/
  # Comments (Giscus or Utterances). Enable per page with `comments: true`.
  comments:
    provider: giscus
    repo: can-dy-jack/ts-mkdocs
    repo_id: R_kgDOTEd3Sg
    category: General
    category_id: DIC_kwDOTEd3Ss4DAiNv
    input_position: bottom
    theme: light
    theme_dark: dark
    lang: zh-CN # TODO
