site_name: ts-mkdocs
site_description: A demo site built with ts-mkdocs to validate features during development
site_url: https://example.com/
repo_url: https://github.com/can-dy-jack/ts-mkdocs# test
repo_name: can-dy-jack/ts-mkdocs # test
# repo_token: 
copyright: Copyright &copy; {year} ts-mkdocs contributors

edit_uri: edit/main/docs/
site_dir: site

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md
    - Admonitions: guide/admonitions.md
  - Feature Showcase:
    - Overview: showcase/index.md
    - Headings: showcase/headings.md
    - Text & Links: showcase/text.md
    - Blockquotes: showcase/blockquote.md
    - Lists: showcase/lists.md
    - Tables: showcase/tables.md
    - Code Blocks: showcase/code-blocks.md
    - Admonitions: showcase/admonitions.md
    - Content Tabs: showcase/tabs.md
    - Task Lists: showcase/tasklist.md
    - Icons: showcase/icons.md
    - Footnotes: showcase/footnotes.md
    - Attributes: showcase/attributes.md
    - Keyboard & Mark: showcase/keys-mark.md
    - Combinations: showcase/combinations.md
  - Reference:
    - CLI: reference/cli.md
    - Plugin API: reference/plugins.md
  - Changelog: changelog.md

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: teal
      accent: teal
    - scheme: slate
      primary: indigo
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  # Syntax highlighting themes (Shiki built-in theme names)
  # Light candidates: github-light, catppuccin-latte, solarized-light, min-light
  # Dark  candidates: github-dark, dracula, nord, one-dark-pro, catppuccin-mocha
  highlight:
    theme_light: catppuccin-latte
    theme_dark: github-dark
  icons:
    default: material
    libraries:
      - material
      - fontawesome
      - bootstrap
  icon:
    admonition:
      note: material/info
      tip: material/lightbulb
    theme:
      light: material/wb_sunny
      dark: material/dark_mode
      system: material/brightness_auto
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.linenumbers
    - content.code.lang

plugins:
  - search
  - tags
  - social

markdown_extensions:
  - admonition:
      default_collapsed: false
  - pymdownx.details:
      default_collapsed: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.keys
  - pymdownx.mark
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3   # include h2–h3 in page TOC (default: 3)

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/can-dy-jack/ts-mkdocs
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/
    - icon: fontawesome/brands/discord
      link: https://discord.com/
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/
