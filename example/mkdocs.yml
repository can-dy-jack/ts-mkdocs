site_name: ts-mkdocs
site_description: A demo site built with ts-mkdocs to validate features during development
site_url: https://example.com/
repo_url: https://github.com/anthropics/claude-code # test
repo_name: anthropics/claude-code # test
# repo_token: .env里去
copyright: Copyright &copy; {year} ts-mkdocs contributors

edit_uri: edit/main/docs/
site_dir: site

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md
    - Frontmatter: guide/frontmatter.md
    - Admonitions: guide/admonitions.md
  - Feature Showcase:
    - Overview: showcase/index.md
    - Basic Syntax:
      - Headings: showcase/basic/headings.md
      - Text & Links: showcase/basic/text.md
      - Blockquotes: showcase/basic/blockquote.md
      - Lists: showcase/basic/lists.md
      - Tables: showcase/basic/tables.md
    - Extended Syntax:
      - Code Blocks: showcase/extended/code-blocks.md
      - Task Lists: showcase/extended/tasklist.md
      - Footnotes: showcase/extended/footnotes.md
      - Icons: showcase/extended/icons.md
      - Keyboard & Mark: showcase/extended/keys-mark.md
      - Superscript & Subscript: showcase/extended/sup-sub.md
      - Images: showcase/extended/images.md
      - Attributes: showcase/extended/attributes.md
    - Advanced Components:
      - Admonitions: showcase/advanced/admonitions.md
      - Content Tabs: showcase/advanced/tabs.md
      - Annotations: showcase/advanced/annotations.md
      - Math: showcase/advanced/math.md
    - Nesting & Combinations:
      - Combinations: showcase/nesting/combinations.md
  - Reference:
    - CLI: reference/cli.md
    - Plugin API: reference/plugins.md
  - Changelog: changelog.md

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: indigo
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  # Syntax highlighting themes (Shiki built-in theme names)
  # Light candidates: github-light, catppuccin-latte, solarized-light, min-light
  # Dark  candidates: github-dark, dracula, nord, one-dark-pro, catppuccin-mocha
  highlight:
    theme_light: catppuccin-latte
    theme_dark: github-dark
  icons:
    default: material
    libraries:
      - material
      - fontawesome
      - bootstrap
  icon:
    admonition:
      note: material/info
      tip: material/lightbulb
    theme:
      light: material/wb_sunny
      dark: material/dark_mode
      system: material/brightness_auto
  # Reader settings panel (header gear icon). Omit any field to keep built-in defaults.
  # Default accent color follows theme.palette primary; choices persist in localStorage.
  settings:
    enabled: true
    colors:
      - name: Blue
        color: "#2196f3"
      - name: Teal
        color: "#009688"
      - name: Green
        color: "#4caf50"
      - name: Purple
        color: "#9c27b0"
    fonts:
      - name: System
      - name: Serif
        family: '"Noto Serif", Georgia, serif'
        url: https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap
      - name: Mono
        family: '"JetBrains Mono", "Fira Code", monospace'
    font_sizes:
      - name: Small
        value: 90
      - name: Default
        value: 115
      - name: Large
        value: 135
      - name: Extra large
        value: 160
    default_font_size: 115
  # Page-level share buttons (shown at the bottom of each article)
  share:
    enabled: true
    platforms:
      - x
      - facebook
      - weibo
      - linkedin
      - wechat
      - bilibili
      - zhihu
      - reddit
      - telegram
      - whatsapp
      - email
      - threads
      - bluesky
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.linenumbers
    - content.code.lang
    - content.code.wrap
    - content.code.annotate
    - content.image.lightbox

plugins:
  - search
  - meta
  - tags:
      sort_by: count
  - social

markdown_extensions:
  - admonition:
      default_collapsed: false
  - pymdownx.details:
      default_collapsed: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - attr_list
  - tables
  - footnotes
  - pymdownx.arithmatex:
      provider: katex
      version: "0.16.22"
      cdn:
        base: https://cdn.jsdelivr.net/npm/katex@0.16.22/dist
  - toc:
      permalink: true
      toc_depth: 3   # include h2–h3 in page TOC (default: 3)

extra:
  authors:
    kartjim:
      name: Kart Jim
      title: ts-mkdocs author
      avatar: https://avatars.githubusercontent.com/u/62332701
      url:
        github: can-dy-jack/ts-mkdocs
        x: kartjim2
        reddit: kartjim
        youtube: kartjim5475
        bilibili: 481922596
        website: https://kartjim.cn
  reading_time:
    enabled: true
    words_per_minute: 265
    cjk_chars_per_minute: 500
    exclude_code: true
    min_minutes: 1
  license:
    enabled: true
    preset: cc-by-nc-sa-4.0
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/can-dy-jack/ts-mkdocs
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/
    - icon: fontawesome/brands/discord
      link: https://discord.com/
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/
